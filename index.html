

<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telebirr Pro V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; margin: 0; background-color: #f5f5f5; -webkit-font-smoothing: antialiased; }
        
        /* Input Slide */
        #input-page { padding: 25px; max-width: 400px; margin: auto; background: white; min-height: 100vh; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .gen-btn { background: #8bc34a; color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-size: 17px; cursor: pointer; }

        /* Receipt Slide */
        #receipt-page { display: none; background: white; width: 100%; max-width: 450px; margin: 0 auto; min-height: 100vh; }
        
        .top-nav { display: flex; justify-content: space-between; padding: 15px 20px; color: #8bc34a; font-size: 14px; align-items: center; }
        .download-box { border: 1px solid #8bc34a; border-radius: 4px; padding: 0 5px; margin-right: 5px; font-size: 18px; }

        /* Success Icon - በትክክል እንዲመስል የተስተካከለ */
        .success-section { text-align: center; margin-top: 10px; }
        .circle-icon { 
            background: #8bc34a; width: 60px; height: 60px; border-radius: 50%; 
            display: inline-flex; align-items: center; justify-content: center; margin-bottom: 8px;
        }
        .checkmark-svg { width: 32px; height: 32px; fill: none; stroke: white; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
        .status-msg { color: #8bc34a; font-size: 15px; }
        
        /* Amount Section - የብር መጠን አጻጻፍ ተስተካክሏል */
        .amount-row { text-align: center; margin: 30px 0; color: #000; display: flex; justify-content: center; align-items: baseline; }
        .minus-sign { font-size: 32px; margin-right: 2px; font-weight: 500; }
        .amount-val { font-size: 44px; font-weight: 400; }
        .curr-unit { font-size: 13px; margin-left: 6px; color: #333; }

        .line { border-top: 1px solid #f2f2f2; margin: 0 25px; }

        /* Details Section - የግብይት አይነት ተጨምሯል */
        .details-box { padding: 25px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; }
        .lbl { color: #888; font-weight: 300; }
        .val { color: #000; font-weight: 400; text-align: right; }
        
        .qr-link { text-align: right; padding: 0 25px 15px; color: #8bc34a; font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: flex-end; gap: 5px; }

        /* Promo Banner & Dots - ምስሉ እንዲታይ ተስተካክሏል */
        .promo-container { margin: 0 20px; text-align: center; }
        .promo-banner { border-radius: 15px; overflow: hidden; height: 135px; }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }
        .dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; padding-bottom: 20px; }
        .dot { width: 7px; height: 7px; background: #ddd; border-radius: 50%; }
        .dot.active { background: #8bc34a; }
        
        .btn-footer { background: #8bc34a; color: white; text-align: center; padding: 15px; border-radius: 12px; margin: 20px 25px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div id="input-page">
        <h2 style="color: #8bc34a; text-align: center;">Telebirr</h2>
        <input type="text" id="inName" placeholder="የተቀባይ ስም">
        <input type="number" id="inAmount" placeholder="የብር መጠን">
        <button class="gen-btn" onclick="generateReceipt()">Generate</button>
    </div>

    <div id="receipt-page">
        <div class="top-nav">
            <span style="display: flex; align-items: center;"><span class="download-box">&darr;</span> Download</span>
            <span>ለማጋራት &#8942;</span>
        </div>
 <div class="success-section">
            <div class="circle-icon">
                <svg class="checkmark-svg" viewBox="0 0 24 24">
                    <path d="M5 12l5 5L20 7"></path>
                </svg>
            </div>
            <div class="status-msg">ተሳክቷል</div>
        </div>

        <div class="amount-row">
            <span class="minus-sign">-</span>
            <span class="amount-val" id="outAmount">0.00</span>
            <span class="curr-unit">(ብር)</span>
        </div>

        <div class="line"></div>

        <div class="details-box">
            <div class="info-row"><span class="lbl">የግብይት ጊዜ:</span><span class="val" id="outDate"></span></div>
            <div class="info-row"><span class="lbl">የግብይት አይነት:</span><span class="val">ገንዘብ ለመላክ</span></div>
            <div class="info-row"><span class="lbl">ግብይት ወደ:</span><span class="val" id="outName"></span></div>
            <div class="info-row"><span class="lbl">የግብይት ቁጥር:</span><span class="val">ADD34HH65M5</span></div>
        </div>

        <div class="qr-link">
            <span style="font-size: 18px;">&#9638;</span> QR Code &gt;
        </div>

        <div class="promo-container">
            <div class="promo-banner">
                <img src="3.jpg" alt="Promotion">
            </div>
            <div class="dots">
                <div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="btn-footer" onclick="location.reload()">ለመዝጋት</div>
    </div>

    <script>
        function generateReceipt() {
            const name = document.getElementById('inName').value || "Tirfua";
            const amount = document.getElementById('inAmount').value || "0.00";
            
            const now = new Date();
            const dateStr = now.getFullYear() + "/" + 
                            String(now.getMonth()+1).padStart(2, '0') + "/" + 
                            String(now.getDate()).padStart(2, '0') + " " + 
                            String(now.getHours()).padStart(2, '0') + ":" + 
                            String(now.getMinutes()).padStart(2, '0') + ":" + 
                            String(now.getSeconds()).padStart(2, '0');

            document.getElementById('outName').innerText = name;
            document.getElementById('outAmount').innerText = parseFloat(amount).toFixed(2);
            document.getElementById('outDate').innerText = dateStr;

            document.getElementById('input-page').style.display = 'none';
            document.getElementById('receipt-page').style.display = 'block';
        }
    </script>
</body>
